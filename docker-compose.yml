version: '3.8'

services:
  # ==================== PostgreSQL 目标库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: proxy-target-pg
    environment:
      POSTGRES_USER: sdtpu
      POSTGRES_PASSWORD: pg_password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdtpu -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== SDT Proxy 实例 ====================
  sdtp:
    build: .
    container_name: sdtp-proxy
    ports:
      - "3306:3306"
      - "13306:13306"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
      PROXY_CONFIG: /opt/sdtp/config/proxy-config-docker.yml
    volumes:
      - ./sdtp-server/src/main/resources/proxy-config-docker.yml:/opt/sdtp/config/proxy-config-docker.yml
      - sdtp_logs:/opt/sdtp/logs
    depends_on:
      postgres:
        condition: service_healthy

  # ==================== Prometheus 指标抓取 ====================
  prometheus:
    image: prom/prometheus:v2.45.6
    container_name: proxy-monitor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    depends_on:
      - sdtp

  # ==================== Loki 日志存储 ====================
  loki:
    image: grafana/loki:2.9.1
    container_name: proxy-monitor-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml


  # ==================== Promtail 日志收集 ====================
  promtail:
    image: grafana/promtail:2.9.1
    container_name: proxy-monitor-promtail
    volumes:
      - ./monitoring/promtail:/etc/promtail
      - sdtp_logs:/var/log/sdtp:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  # ==================== Grafana 展示看板 ====================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: proxy-monitor-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  pg_data:
  sdtp_logs:
  prometheus_data:
  loki_data:
  grafana_data:

