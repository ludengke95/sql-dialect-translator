version: '3.8'

services:
  # ==================== PostgreSQL 目标库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: proxy-target-pg
    environment:
      POSTGRES_USER: sdtpu
      POSTGRES_PASSWORD: pg_password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdtpu -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== SDT Proxy 实例 ====================
  sdtp:
    build: .
    container_name: sdtp-proxy
    ports:
      - "3306:3306"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
      PROXY_CONFIG: /opt/sdtp/config/proxy-config-docker.yml
    volumes:
      - ./sdtp-server/src/main/resources/proxy-config-docker.yml:/opt/sdtp/config/proxy-config-docker.yml
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
