# =============================================================================
# SDTP 多客户端集成测试 (TPC-C / TPC-H)
#
# 测试 job 分为:
#   1. build           — 统一构建所有 Docker 镜像（SDTP + sqlline-5 + sqlline-8）
#   2. mysql-client-5  — Docker mysql:5.7 原生客户端
#   3. mysql-client-8  — Docker mysql:8.0 原生客户端
#   4. mysql-jdbc-5    — Docker mysql5-sqlline (JDBC 5.1.49)
#   5. mysql-jdbc-8    — Docker mysql8-sqlline (JDBC 8.0.28)
#   6. python-mysql    — Python mysql.connector
# =============================================================================

name: SDTP Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SDTP_USER: root
  SDTP_PASSWORD: proxy_password
  SDTP_PORT: 3306
  PG_USER: sdtpu
  PG_PASSWORD: pg_password
  PG_DB: mydb
  PG_PORT: 5432

# ============================================================================
# Job 1: 统一构建 — Maven + 3 个 Docker 镜像
# ============================================================================
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # --- SDTP 构建 ---
      - name: Build SDTP with Maven
        run: mvn clean package -DskipTests -B

      - name: Build SDTP Docker image
        run: docker build -t sdtp:latest .

      - name: Save SDTP Docker image
        run: docker save sdtp:latest | gzip > /tmp/sdtp-image.tar.gz

      - name: Upload SDTP Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdtp-docker-image
          path: /tmp/sdtp-image.tar.gz
          retention-days: 1

      # --- sqlline MySQL 5 构建 ---
      - name: Build mysql5-sqlline Docker image
        run: |
          docker build -t mysql5-sqlline:latest \
            -f benchmark/sqlline/Dockerfile.mysql5-sqlline \
            benchmark/sqlline/

      - name: Save mysql5-sqlline Docker image
        run: docker save mysql5-sqlline:latest | gzip > /tmp/mysql5-sqlline.tar.gz

      - name: Upload mysql5-sqlline Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql5-sqlline-docker-image
          path: /tmp/mysql5-sqlline.tar.gz
          retention-days: 1

      # --- sqlline MySQL 8 构建 ---
      - name: Build mysql8-sqlline Docker image
        run: |
          docker build -t mysql8-sqlline:latest \
            -f benchmark/sqlline/Dockerfile.mysql8-sqlline \
            benchmark/sqlline/

      - name: Save mysql8-sqlline Docker image
        run: docker save mysql8-sqlline:latest | gzip > /tmp/mysql8-sqlline.tar.gz

      - name: Upload mysql8-sqlline Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql8-sqlline-docker-image
          path: /tmp/mysql8-sqlline.tar.gz
          retention-days: 1

# ============================================================================
# 通用步骤：启动 SDTP + PostgreSQL + 加载数据（复合 Action 模板）
# ============================================================================

  # ==========================================================================
  # Job 2: MySQL Client 5 (原生 mysql:5.7 容器)
  # ==========================================================================
  mysql-client-5:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
          POSTGRES_DB: ${{ env.PG_DB }}
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U ${{ env.PG_USER }} -d ${{ env.PG_DB }}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SDTP Docker image
        uses: actions/download-artifact@v4
        with:
          name: sdtp-docker-image
          path: /tmp/

      - name: Load SDTP Docker image
        run: gunzip -c /tmp/sdtp-image.tar.gz | docker load

      - name: Create SDTP config and start
        run: |
          cat > /tmp/sdtp-config.yml << 'YAML'
          proxy:
            port: 3306
            auth:
              user: root
              password: proxy_password
          target:
            dialect: POSTGRESQL
            jdbc-url: jdbc:postgresql://host.docker.internal:5432/${{ env.PG_DB }}
            username: ${{ env.PG_USER }}
            password: ${{ env.PG_PASSWORD }}
            max-pool-size: 10
            min-idle: 2
          translation:
            keyword-case: UPPER
            identifier-case: LOWER
          YAML

          docker run -d --name sdtp \
            --add-host host.docker.internal:host-gateway \
            -p ${{ env.SDTP_PORT }}:3306 \
            -v /tmp/sdtp-config.yml:/opt/sdtp/config/proxy-config.yml \
            sdtp:latest

          # 等待 SDTP 就绪
          echo "等待 SDTP 启动..."
          for i in $(seq 1 30); do
            if docker logs sdtp 2>&1 | grep -qi "started\|listening"; then
              echo "SDTP 就绪 (尝试 $i)"
              break
            fi
            sleep 3
          done
          docker logs sdtp --tail 20

      - name: Set up Python (数据生成)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install data-gen dependencies
        run: pip install psycopg2-binary

      - name: Create TPC-H tables and load data
        run: |
          PGPASSWORD=${{ env.PG_PASSWORD }} psql -h localhost -U ${{ env.PG_USER }} -d ${{ env.PG_DB }} -f benchmark/tpch/schema_pg.sql
          python benchmark/tpch/data_gen.py \
            --pg-host localhost --pg-port ${{ env.PG_PORT }} \
            --pg-user ${{ env.PG_USER }} --pg-password ${{ env.PG_PASSWORD }} \
            --pg-db ${{ env.PG_DB }} --scale 0.01

      - name: Create TPC-C tables and load data
        run: |
          PGPASSWORD=${{ env.PG_PASSWORD }} psql -h localhost -U ${{ env.PG_USER }} -d ${{ env.PG_DB }} -f benchmark/tpcc/schema_pg.sql
          python benchmark/tpcc/data_gen.py \
            --pg-host localhost --pg-port ${{ env.PG_PORT }} \
            --pg-user ${{ env.PG_USER }} --pg-password ${{ env.PG_PASSWORD }} \
            --pg-db ${{ env.PG_DB }} --warehouses 1

      - name: Run integration test (mysql-client-5)
        run: |
          bash benchmark/run-docker-test.sh \
            --mode mysql-client-5 \
            --host host.docker.internal \
            --port ${{ env.SDTP_PORT }} \
            --user ${{ env.SDTP_USER }} \
            --password ${{ env.SDTP_PASSWORD }} \
            --database ${{ env.PG_DB }} \
            --benchmark all \
            --output-dir benchmark/reports

      - name: Collect SDTP logs
        if: always()
        run: |
          mkdir -p /tmp/sdtp-logs
          docker logs sdtp --tail 300 > /tmp/sdtp-logs/sdtp.log 2>&1 || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-client-5-reports
          path: |
            benchmark/reports/
            /tmp/sdtp-logs/

      - name: Print summary
        if: always()
        run: |
          {
            echo "## MySQL Client 5 测试结果"
            echo ""
            for report in benchmark/reports/report_*.txt; do
              if [ -f "$report" ]; then
                echo '```'
                cat "$report"
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

