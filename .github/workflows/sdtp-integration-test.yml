        id: tpcc
        run: |
          java -cp benchmark:/tmp/mysql-connector-java-8.0.33.jar JavaJdbcTest \
            --host localhost --port ${{ env.SDTP_PORT }} \
            --user ${{ env.SDTP_USER }} --password ${{ env.SDTP_PASSWORD }} \
            --database ${{ env.PG_DB }} \
            --tpcc-queries benchmark/tpcc/queries \
