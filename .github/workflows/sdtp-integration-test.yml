# =============================================================================
# SDTP 多客户端集成测试 (TPC-C / TPC-H)
#
# 通过可复用工作流 integration-test-job.yml 参数化每个客户端模式。
# 公共逻辑集中管理，避免 5 份重复代码。
#
# 测试 job:
#   1. build          — 统一构建 Docker 镜像
#   2. mysql-client-5 — 原生 mysql:5.7
#   3. mysql-client-8 — 原生 mysql:8.0
#   4. mysql-jdbc-5   — JDBC 5.1.49 (sqlline)
#   5. mysql-jdbc-8   — JDBC 8.0.28 (sqlline)
#   6. python-mysql   — mysql-connector-python（容器化）
# =============================================================================

name: SDTP Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
# Job 1: 统一构建 — Maven + 4 个 Docker 镜像
# ============================================================================
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # --- SDTP 构建 ---
      - name: Build SDTP with Maven
        run: mvn clean package -DskipTests -B

      - name: Build SDTP Docker image
        run: docker build -t sdtp:latest .

      - name: Save SDTP Docker image
        run: docker save sdtp:latest | gzip > /tmp/sdtp-image.tar.gz

      - name: Upload SDTP Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdtp-docker-image
          path: /tmp/sdtp-image.tar.gz
          retention-days: 1

      # --- sqlline MySQL 5 构建 ---
      - name: Build mysql5-sqlline Docker image
        run: |
          docker build -t mysql5-sqlline:latest \
            -f benchmark/sqlline/Dockerfile.mysql5-sqlline \
            benchmark/sqlline/

      - name: Save mysql5-sqlline Docker image
        run: docker save mysql5-sqlline:latest | gzip > /tmp/mysql5-sqlline.tar.gz

      - name: Upload mysql5-sqlline Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql5-sqlline-docker-image
          path: /tmp/mysql5-sqlline.tar.gz
          retention-days: 1

      # --- sqlline MySQL 8 构建 ---
      - name: Build mysql8-sqlline Docker image
        run: |
          docker build -t mysql8-sqlline:latest \
            -f benchmark/sqlline/Dockerfile.mysql8-sqlline \
            benchmark/sqlline/

      - name: Save mysql8-sqlline Docker image
        run: docker save mysql8-sqlline:latest | gzip > /tmp/mysql8-sqlline.tar.gz

      - name: Upload mysql8-sqlline Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql8-sqlline-docker-image
          path: /tmp/mysql8-sqlline.tar.gz
          retention-days: 1

      # --- python-mysql 构建 ---
      - name: Build python-mysql Docker image
        run: |
          docker build -t python-mysql:latest \
            -f benchmark/python-mysql/Dockerfile.python-mysql \
            benchmark/python-mysql/

      - name: Save python-mysql Docker image
        run: docker save python-mysql:latest | gzip > /tmp/python-mysql.tar.gz

      - name: Upload python-mysql Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-mysql-docker-image
          path: /tmp/python-mysql.tar.gz
          retention-days: 1

  # ==========================================================================
  # Job 2: MySQL Client 5 (原生 mysql:5.7 容器)
  # ==========================================================================
  mysql-client-5:
    needs: [build]
    uses: ./.github/workflows/integration-test-job.yml
    with:
      test_mode: mysql-client-5
      pg_user: sdtpu
      pg_password: pg_password
      pg_db: mydb
      pg_port: '5432'
      sdtp_user: root
      sdtp_password: proxy_password
      sdtp_port: '3306'
      report_name: mysql-client-5-reports
      summary_title: MySQL Client 5 测试结果

  # ==========================================================================
  # Job 3: MySQL Client 8 (原生 mysql:8.0 容器)
  # ==========================================================================
  mysql-client-8:
    needs: [build]
    uses: ./.github/workflows/integration-test-job.yml
    with:
      test_mode: mysql-client-8
      pg_user: sdtpu
      pg_password: pg_password
      pg_db: mydb
      pg_port: '5432'
      sdtp_user: root
      sdtp_password: proxy_password
      sdtp_port: '3306'
      report_name: mysql-client-8-reports
      summary_title: MySQL Client 8 测试结果

  # ==========================================================================
  # Job 4: MySQL JDBC 5 (mysql5-sqlline 容器，JDBC 5.1.49)
  # ==========================================================================
  mysql-jdbc-5:
    needs: [build]
    uses: ./.github/workflows/integration-test-job.yml
    with:
      test_mode: mysql-jdbc-5
      pg_user: sdtpu
      pg_password: pg_password
      pg_db: mydb
      pg_port: '5432'
      sdtp_user: root
      sdtp_password: proxy_password
      sdtp_port: '3306'
      extra_docker_image_artifact: mysql5-sqlline-docker-image
      extra_docker_image_file: mysql5-sqlline.tar.gz
      report_name: mysql-jdbc-5-reports
      summary_title: MySQL JDBC 5 (sqlline) 测试结果

  # ==========================================================================
  # Job 5: MySQL JDBC 8 (mysql8-sqlline 容器，JDBC 8.0.28)
  # ==========================================================================
  mysql-jdbc-8:
    needs: [build]
    uses: ./.github/workflows/integration-test-job.yml
    with:
      test_mode: mysql-jdbc-8
      pg_user: sdtpu
      pg_password: pg_password
      pg_db: mydb
      pg_port: '5432'
      sdtp_user: root
      sdtp_password: proxy_password
      sdtp_port: '3306'
      extra_docker_image_artifact: mysql8-sqlline-docker-image
      extra_docker_image_file: mysql8-sqlline.tar.gz
      report_name: mysql-jdbc-8-reports
      summary_title: MySQL JDBC 8 (sqlline) 测试结果

  # ==========================================================================
  # Job 6: Python mysql.connector 集成测试（容器化）
  # ==========================================================================
  python-mysql:
    needs: [build]
    uses: ./.github/workflows/integration-test-job.yml
    with:
      test_mode: python-mysql
      pg_user: sdtpu
      pg_password: pg_password
      pg_db: mydb
      pg_port: '5432'
      sdtp_user: root
      sdtp_password: proxy_password
      sdtp_port: '3306'
      extra_docker_image_artifact: python-mysql-docker-image
      extra_docker_image_file: python-mysql.tar.gz
      report_name: python-mysql-reports
      summary_title: Python mysql.connector 测试结果
