# =============================================================================
# SDTP 集成测试 — 可复用工作流
#
# 被 sdtp-integration-test.yml 调用。
# 每个客户端模式复用同一个 job 定义，通过 inputs 参数化差异。
# =============================================================================

name: SDTP Integration Test Job

on:
  workflow_call:
    inputs:
      test_mode:
        description: '测试模式 (mysql-client-5/8, mysql-jdbc-5/8, python-mysql)'
        type: string
        required: true
      pg_user:
        description: 'PostgreSQL 用户'
        type: string
        required: true
      pg_password:
        description: 'PostgreSQL 密码'
        type: string
        required: true
      pg_db:
        description: 'PostgreSQL 数据库名'
        type: string
        required: true
      pg_port:
        description: 'PostgreSQL 端口'
        type: string
        required: true
        default: '5432'
      sdtp_user:
        description: 'SDTP 代理用户'
        type: string
        required: true
      sdtp_password:
        description: 'SDTP 代理密码'
        type: string
        required: true
      sdtp_port:
        description: 'SDTP 代理端口'
        type: string
        required: true
        default: '3306'
      extra_docker_image_artifact:
        description: '额外 Docker 镜像 artifact 名称（jdbc/python 模式需要）'
        type: string
        required: false
        default: ''
      extra_docker_image_file:
        description: '额外 Docker 镜像 tar.gz 文件名（与 artifact 配套）'
        type: string
        required: false
        default: ''
      report_name:
        description: '测试报告 artifact 名称'
        type: string
        required: true
      summary_title:
        description: 'Step Summary 标题'
        type: string
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # services 中不能用 ${{ env.XXX }}，但可以用 ${{ inputs.XXX }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ inputs.pg_user }}
          POSTGRES_PASSWORD: ${{ inputs.pg_password }}
          POSTGRES_DB: ${{ inputs.pg_db }}
        ports:
          - '${{ inputs.pg_port }}:5432'
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.pg_user }} -d ${{ inputs.pg_db }}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # ====================================================================
      # 1. 检出代码
      # ====================================================================
      - name: Checkout
        uses: actions/checkout@v4

      # ====================================================================
      # 2. 下载 SDTP Docker 镜像（所有模式都需要）
      # ====================================================================
      - name: Download SDTP Docker image
        uses: actions/download-artifact@v4
        with:
          name: sdtp-docker-image
          path: /tmp/

      # ====================================================================
      # 3. 下载额外 Docker 镜像（仅 jdbc / python 模式）
      # ====================================================================
      - name: Download extra Docker image
        if: inputs.extra_docker_image_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.extra_docker_image_artifact }}
          path: /tmp/

      # ====================================================================
      # 4. 加载 Docker 镜像
      # ====================================================================
      - name: Load Docker images
        run: |
          gunzip -c /tmp/sdtp-image.tar.gz | docker load
          if [[ -n "${{ inputs.extra_docker_image_file }}" ]]; then
            gunzip -c "/tmp/${{ inputs.extra_docker_image_file }}" | docker load
          fi

      # ====================================================================
      # 5. 创建 SDTP 配置并启动
      # ====================================================================
      - name: Create SDTP config and start
        run: |
          cat > /tmp/sdtp-config.yml << 'YAML'
          proxy:
            port: ${{ inputs.sdtp_port }}
            auth:
              user: ${{ inputs.sdtp_user }}
              password: ${{ inputs.sdtp_password }}
          target:
            dialect: POSTGRESQL
            jdbc-url: jdbc:postgresql://host.docker.internal:${{ inputs.pg_port }}/${{ inputs.pg_db }}
            username: ${{ inputs.pg_user }}
            password: ${{ inputs.pg_password }}
            max-pool-size: 10
            min-idle: 2
          translation:
            keyword-case: UPPER
            identifier-case: LOWER
          YAML

          docker run -d --name sdtp \
            --add-host host.docker.internal:host-gateway \
            -p ${{ inputs.sdtp_port }}:3306 \
            -v /tmp/sdtp-config.yml:/opt/sdtp/config/proxy-config.yml \
            sdtp:latest

          # 等待 SDTP 就绪
          echo "等待 SDTP 启动..."
          for i in $(seq 1 30); do
            if docker logs sdtp 2>&1 | grep -qi "started\|listening"; then
              echo "SDTP 就绪 (尝试 $i)"
              break
            fi
            sleep 3
          done
          docker logs sdtp --tail 20

      # ====================================================================
      # 6. 准备 Python 环境（数据生成）
      # ====================================================================
      - name: Set up Python (数据生成)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install data-gen dependencies
        run: pip install psycopg2-binary

      # ====================================================================
      # 7. 创建测试表并加载数据
      # ====================================================================
      - name: Create TPC-H tables and load data
        run: |
          PGPASSWORD=${{ inputs.pg_password }} psql -h localhost -U ${{ inputs.pg_user }} -d ${{ inputs.pg_db }} -f benchmark/tpch/schema_pg.sql
          python benchmark/tpch/data_gen.py \
            --pg-host localhost --pg-port ${{ inputs.pg_port }} \
            --pg-user ${{ inputs.pg_user }} --pg-password ${{ inputs.pg_password }} \
            --pg-db ${{ inputs.pg_db }} --scale 0.01

      - name: Create TPC-C tables and load data
        run: |
          PGPASSWORD=${{ inputs.pg_password }} psql -h localhost -U ${{ inputs.pg_user }} -d ${{ inputs.pg_db }} -f benchmark/tpcc/schema_pg.sql
          python benchmark/tpcc/data_gen.py \
            --pg-host localhost --pg-port ${{ inputs.pg_port }} \
            --pg-user ${{ inputs.pg_user }} --pg-password ${{ inputs.pg_password }} \
            --pg-db ${{ inputs.pg_db }} --warehouses 1

      # ====================================================================
      # 8. 执行集成测试
      # ====================================================================
      - name: Run integration test (${{ inputs.test_mode }})
        run: |
          bash benchmark/run-docker-test.sh \
            --mode ${{ inputs.test_mode }} \
            --host host.docker.internal \
            --port ${{ inputs.sdtp_port }} \
            --user ${{ inputs.sdtp_user }} \
            --password ${{ inputs.sdtp_password }} \
            --database ${{ inputs.pg_db }} \
            --benchmark all \
            --output-dir benchmark/reports

      # ====================================================================
      # 9. 收集 SDTP 日志 & 上传报告
      # ====================================================================
      - name: Collect SDTP logs
        if: always()
        run: |
          mkdir -p /tmp/sdtp-logs
          docker logs sdtp --tail 300 > /tmp/sdtp-logs/sdtp.log 2>&1 || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.report_name }}
          path: |
            benchmark/reports/
            /tmp/sdtp-logs/

      # ====================================================================
      # 10. 打印摘要
      # ====================================================================
      - name: Print summary
        if: always()
        run: |
          {
            echo "## ${{ inputs.summary_title }}"
            echo ""
            for report in benchmark/reports/report_*.txt; do
              if [ -f "$report" ]; then
                echo '```'
                cat "$report"
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
