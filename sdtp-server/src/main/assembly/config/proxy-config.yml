# ============================================================================
# SDTP 配置文件
# ============================================================================
# 修改此文件后重启 Proxy:  ./bin/start.sh restart   或   bin\start.bat stop && bin\start.bat start
# 也可通过环境变量指定其他配置文件:  export PROXY_CONFIG=/path/to/other-config.yml
# ============================================================================

proxy:
  # Proxy 监听的端口（客户端连接此端口）
  port: 3306

  # 客户端认证信息（客户端用此账密连接 Proxy）
  auth:
    user: root
    password: proxy_password

target:
  # 目标数据库方言: POSTGRESQL | MYSQL | ORACLE | SQLSERVER
  dialect: POSTGRESQL

  # 目标数据库 JDBC URL
  # PostgreSQL:  jdbc:postgresql://主机:5432/数据库名
  # MySQL:       jdbc:mysql://主机:3306/数据库名
  # Oracle:      jdbc:oracle:thin:@主机:1521:SID
  # SQL Server:  jdbc:sqlserver://主机:1433;databaseName=数据库名
  jdbc-url: jdbc:highgo://10.110.60.187:5866/highgo?useUnicode=true&characterEncoding=utf8&currentSchema=meta_data_center

  # 目标数据库账密
  username: highgo
  password: Highgo@12345

  # 连接池配置
  max-pool-size: 20 # 最大连接数
  min-idle: 2 # 最小空闲连接数

# ============================================================================
# SQL 翻译配置（源 MySQL 方言 → 目标方言，仅当 dialect ≠ MYSQL 时生效）
# ============================================================================
translation:
  # 关键词大小写：UPPER（默认）| LOWER
  keyword-case: UPPER

  # 标识符大小写：LOWER（默认）| UPPER | UNCHANGED
  #   PostgreSQL/HighGo 推荐 LOWER（因为 PG 会把未引用标识符自动转小写）
  #   Oracle/DM 推荐 UPPER
  #   MySQL 推荐 UNCHANGED（翻译禁用时此项无意义）
  identifier-case: LOWER
